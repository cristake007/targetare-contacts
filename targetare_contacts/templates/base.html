<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Targetare Contacts{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div>
        <strong>Targetare Contacts</strong>
        <span>Interogare contacte firme după CUI</span>
      </div>
      <span class="api-state {{ 'ok' if api_configured else 'missing' }}">
        API {{ 'configurat' if api_configured else 'neconfigurat' }}
      </span>
    </div>
  </header>

  <main class="container">
    {% for category, message in get_flashed_messages(with_categories=true) %}
      <div class="alert {{ category }}">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
